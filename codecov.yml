coverage:
  status:
    project:
      default:
        target: auto
        threshold: 0%
        base: auto
        flags:
          - server
          - client
      server:
        target: auto
        threshold: 0%
        base: auto
        flags:
          - server
      client:
        target: auto
        threshold: 0%
        base: auto
        flags:
          - client
    patch:
      default:
        target: auto
        threshold: 0%
        base: auto
        flags:
          - server
          - client
      server:
        target: auto
        threshold: 0%
        base: auto
        flags:
          - server
      client:
        target: auto
        threshold: 0%
        base: auto
        flags:
          - client

comment:
  layout: "diff, flags, files"
  behavior: default
  require_changes: false
  require_base: false
  require_head: true
  hide_project_coverage: false
  show_carryforward_flags: true

flags:
  server:
    paths:
      - server/**
    carryforward: true
  client:
    paths:
      - client/**
    carryforward: true

ignore:
  - "server/src/**/*.test.ts"
  - "server/src/scripts/**"
  - "server/src/**/*.module.ts"
  - "server/src/main.ts"
  - "server/src/db/schema/**"
  - "server/src/**/*.types.ts"
  - "server/src/**/*.interface.ts"
  - "server/src/**/*.constants.ts"
  - "server/src/**/*.enum.ts"
  - "server/src/config/**"
  - "server/src/common/types/**"
  - "client/src/**/*.test.ts"
  - "client/src/**/*.spec.ts"
  - "client/src/**/__tests__/**"
  - "client/src/main.ts"
  - "client/src/**/*.d.ts"
  - "client/src/**/*.types.ts"
