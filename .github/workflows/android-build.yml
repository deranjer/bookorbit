name: Android Build

# Builds and tests the native Kotlin Android app (android/). Runs on PRs and on
# pushes to main that touch android/**.
#
# Release signing + Play upload are added later: provide an upload keystore (base64) and a
# Play service-account JSON as repo secrets, then add a bundleRelease + upload step.

on:
  push:
    branches: [main]
    paths:
      - "android/**"
  pull_request:
    paths:
      - "android/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Lint, test, assemble
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Lint
        working-directory: android
        run: ./gradlew :app:lintDebug --no-daemon

      - name: Unit tests
        working-directory: android
        run: ./gradlew :app:testDebugUnitTest --no-daemon

      - name: Assemble debug APK
        working-directory: android
        run: ./gradlew :app:assembleDebug --no-daemon

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
