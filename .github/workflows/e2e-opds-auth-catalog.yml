name: OPDS Auth Catalog E2E
run-name: ${{ format('OPDS Auth Catalog E2E - {0}', github.ref_name) }}

on:
  workflow_dispatch:
  push:
    paths:
      - "server/src/modules/opds/**"
      - "server/src/modules/book/**"
      - "server/src/modules/library/**"
      - "server/src/modules/collection/**"
      - "server/src/modules/lens/**"
      - "server/src/modules/user/**"
      - "server/src/modules/auth/**"
      - "server/src/modules/app-settings/**"
      - "server/test/opds-auth-catalog.e2e-spec.ts"
      - "server/test/e2e/opds/**"
      - "server/test/e2e/**"
      - "server/src/db/schema/**"
      - "packages/types/src/**"
      - "scripts/test/**"
      - "scripts/db/**"
  pull_request:
    paths:
      - "server/src/modules/opds/**"
      - "server/src/modules/book/**"
      - "server/src/modules/library/**"
      - "server/src/modules/collection/**"
      - "server/src/modules/lens/**"
      - "server/src/modules/user/**"
      - "server/src/modules/auth/**"
      - "server/src/modules/app-settings/**"
      - "server/test/opds-auth-catalog.e2e-spec.ts"
      - "server/test/e2e/opds/**"
      - "server/test/e2e/**"
      - "server/src/db/schema/**"
      - "packages/types/src/**"
      - "scripts/test/**"
      - "scripts/db/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write

jobs:
  opds-auth-catalog-e2e:
    uses: ./.github/workflows/e2e-runner.yml
    with:
      suite-id: opds-auth-catalog
      check-name: Server OPDS Auth Catalog E2E
      artifact-name: opds-auth-catalog-e2e-report
      job-timeout-minutes: 45
